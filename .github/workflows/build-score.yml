name: Build Scores

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup LilyPond
        uses: codello/setup-lilypond@main
        with:
          lilypond-version: 2.24

      - name: Avoid Lilypond version issues
        run: |
          find . -name "*.ly" -type f | while read -r file; do
              echo "Processing $file"
              convert-ly -e -c "$file"
          done

      - name: Generate PDFs, MIDIs and PNGs
        run: |
          find . -name "*.ly" -type f | while read -r file; do
              echo "Processing $file"
              pushd "$(dirname "$file")"
              lilypond -dno-point-and-click \
                       --formats=pdf,midi,png \
                       "$(basename "$file")"
              popd
          done

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate index
        run: |
          python make_toc.py scores "${{ github.server_url }}/${{ github.repository }}" --branch "${{ github.ref_name }}"
      
      - name: Create html index
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pandoc
          cd scores
          pandoc -s -o index.html index.md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: scores


  deploy:
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
        with:
          artifact_name: github-pages
